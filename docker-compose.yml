version: '3'

services:
  invoice_ocr:
    build: .
    container_name: invoice_ocr
    restart: always
    ports:
      - "5001:5001"
    volumes:
      - ./data:/app/data
      - ./app/static/uploads:/app/app/static/uploads
    environment:
      - APP_ENV=production
      - SECRET_KEY=${SECRET_KEY:-}
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5001/')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - invoice_ocr_network

networks:
  invoice_ocr_network:
    driver: bridge
